<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EW | Ruta optima</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/transportista-shared.css">
  <link rel="stylesheet" href="css/rutaoptima.css">
</head>
<body data-transport-page="ruta-optima">
  <div class="page-shell transport-shell">
    <aside class="sidebar transport-sidebar" data-transport-sidebar></aside>

    <main class="content-shell transport-content">
      <header class="transport-topbar">
        <div>
          <p class="eyebrow">Panel de transportistas</p>
          <h1>Ruta optima</h1>
          <p class="transport-subtitle">Calcula un recorrido balanceado entre recogidas, entregas y notas especiales.</p>
        </div>
        <div class="topbar-actions">
          <span class="welcome-chip">Trayecto inteligente activo</span>
          <a class="button ghost" href="loguin.html">Cerrar sesion</a>
        </div>
      </header>

      <section class="transport-card optimizer-layout">
        <article class="gold-panel optimizer-form">
          <div class="section-heading">
            <div>
              <p class="panel-kicker">Alternativa</p>
              <h2>Optimizador de ruta</h2>
            </div>
          </div>
          <form id="routeForm">
            <label class="field-label" for="startPoint">Punto de partida</label>
            <input class="field-input" id="startPoint" type="text" value="Bodega principal EW">

            <label class="field-label" for="pickupPoints">Puntos de recogida</label>
            <input class="field-input" id="pickupPoints" type="text" value="4 puntos activos">

            <label class="field-label" for="deliveryPoints">Puntos de entrega</label>
            <input class="field-input" id="deliveryPoints" type="text" value="6 puntos activos">

            <label class="field-label" for="personalNotes">Otros recados personales</label>
            <textarea class="field-input field-textarea" id="personalNotes">Priorizar centro antes del mediodia y cerrar con entregas del norte.</textarea>

            <button class="button primary wide-button" type="submit">Calcular ruta</button>
          </form>
        </article>

        <article class="gold-panel proposed-route">
          <div class="section-heading">
            <div>
              <p class="panel-kicker">Secuencia sugerida</p>
              <h2>Ruta propuesta</h2>
            </div>
            <button class="button secondary" type="button" id="openRouteMap">Ver en mapa</button>
          </div>
          <ol class="route-list" id="proposedRoute"></ol>
        </article>
      </section>

      <section class="transport-card gold-panel results-panel">
        <div class="section-heading">
          <div>
            <p class="panel-kicker">Resumen final</p>
            <h2>Resultados del optimizador</h2>
          </div>
          <button class="button secondary" type="button" id="openResultsMap">Ver en mapa</button>
        </div>
        <div class="results-grid" id="optimizerResults"></div>
      </section>
    </main>
  </div>

  <script src="js/transportista-data.js"></script>
  <script src="js/shared-layout-transportista.js"></script>
  <script src="js/rutaoptima.js"></script>
</body>
</html>
