<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EW | Pedidos</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/pedidos.css">
</head>
<body data-page="pedidos">
  <div class="page-shell">
    <aside class="sidebar" data-sidebar></aside>

    <main class="content-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Produccion personalizada</p>
          <h1>Pedidos</h1>
        </div>
        <div class="topbar-actions">
          <span class="welcome-chip">Seguimiento centralizado</span>
        </div>
      </header>

      <section class="hero-panel orders-hero">
        <div>
          <p class="hero-kicker">Flujo operativo</p>
          <h2>Controla solicitudes nuevas, en proceso y entregadas</h2>
          <p class="hero-copy">
            La vista mantiene filtros claros, tarjetas uniformes y prioridad visual para que el
            trabajo diario sea mas rapido y predecible.
          </p>
        </div>
      </section>

      <section class="panel orders-panel">
        <div class="panel-header orders-header">
          <div>
            <p class="panel-kicker">Estados</p>
            <h3>Pedidos personalizados</h3>
          </div>
          <div class="tabs" role="tablist" aria-label="Filtrar pedidos">
            <button class="tab active" type="button" data-tab="disponibles">Disponibles</button>
            <button class="tab" type="button" data-tab="mios">Mis pedidos</button>
            <button class="tab" type="button" data-tab="terminados">Terminados</button>
          </div>
        </div>

        <div id="listaPedidos" class="orders-list"></div>
      </section>
    </main>
  </div>

  <script src="js/shared-layout.js"></script>
  <script src="js/pedidos.js"></script>
</body>
</html>
